<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>zest · ai polish</title>
		<link rel="stylesheet" href="../dist/ink.css" />
		<script type="module" src="../dist/zest.js"></script>
		<style>
			body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans, system-ui, sans-serif); padding: 2rem; }
			.wrap { max-width: 620px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.75rem; }
			h2 { font-size: 0.85rem; color: var(--muted-foreground); margin: 0 0 0.6rem; }
			p { line-height: 1.6; }
			.log { font-family: var(--font-mono, monospace); font-size: 0.8rem; color: var(--muted-foreground); }
			.composer-row { display: flex; align-items: center; gap: 0.5rem; border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem 0.75rem; }
			.composer-row .grow { flex: 1; color: var(--muted-foreground); }
		</style>
	</head>
	<body>
		<div class="wrap">
			<section>
				<h2>z-citation (inline) + z-sources</h2>
				<p>The capital of Australia is Canberra<z-citation index="1"></z-citation>, not Sydney<z-citation index="2"></z-citation>. It was purpose-built as a compromise between the two larger cities<z-citation index="3"></z-citation>.</p>
				<z-sources id="sources"></z-sources>
			</section>

			<section>
				<h2>z-suggestion-chips</h2>
				<z-suggestion-chips id="chips"></z-suggestion-chips>
			</section>

			<section>
				<h2>z-model-picker (in a composer row)</h2>
				<div class="composer-row">
					<z-model-picker id="picker" menu-below></z-model-picker>
					<span class="grow">Message…</span>
					<z-send-button></z-send-button>
				</div>
			</section>

			<div class="log" id="log">events land here</div>
		</div>

		<script type="module">
			const log = document.getElementById('log')
			document.getElementById('sources').sources = [
				{ title: 'Canberra — Wikipedia', url: 'https://en.wikipedia.org/wiki/Canberra', snippet: 'Canberra is the capital city of Australia.' },
				{ title: 'Why Canberra is the capital', url: 'https://www.nationalcapital.gov.au/', snippet: 'A compromise between Sydney and Melbourne, chosen in 1908.' },
				{ title: 'Australian Capital Territory', url: 'https://example.gov.au/act' }
			]
			document.getElementById('chips').suggestions = ['Summarize this', "Explain like I'm 5", 'Show sources', 'Draft a reply']
			const picker = document.getElementById('picker')
			picker.models = [
				{ value: 'opus', name: 'Opus 4.8', description: 'Most capable — deep reasoning' },
				{ value: 'sonnet', name: 'Sonnet 5', description: 'Balanced speed and quality' },
				{ value: 'haiku', name: 'Haiku 4.5', description: 'Fastest, most affordable' }
			]
			picker.value = 'opus'

			document.getElementById('chips').addEventListener('select', (e) => log.textContent = 'chip → ' + e.detail.label)
			document.getElementById('sources').addEventListener('select', (e) => log.textContent = 'source → #' + (e.detail.index+1))
			picker.addEventListener('change', (e) => log.textContent = 'model → ' + e.detail.value)
		</script>
	</body>
</html>
