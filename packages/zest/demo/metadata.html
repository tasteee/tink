<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>zest · message metadata</title>
		<link rel="stylesheet" href="../dist/ink.css" />
		<script type="module" src="../dist/zest.js"></script>
		<style>
			body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans, system-ui, sans-serif); padding: 2rem; }
			.wrap { max-width: 560px; margin: 0 auto; }
			.meta { display: flex; align-items: center; gap: 0.35rem; justify-content: flex-end; margin-top: 2px; }
			.meta .t { font-size: 0.6875rem; color: var(--muted-foreground); }
			h2 { font-size: 0.85rem; color: var(--muted-foreground); margin: 1.5rem 0 0.6rem; }
			.own { display: flex; flex-direction: column; align-items: flex-end; }
		</style>
	</head>
	<body>
		<div class="wrap">
			<z-message-list style="height:420px;border:1px solid var(--border);border-radius:12px">
				<z-date-divider label="Today"></z-date-divider>

				<z-message-group side="start" name="Alice Rivera" avatar-name="Alice Rivera" timestamp="2026-07-05T11:56:00Z">
					<z-message-bubble>Hey! Did you see the new designs?</z-message-bubble>
				</z-message-group>

				<div class="own">
					<z-message-bubble side="end" group="single">
						<z-quoted-message name="Alice Rivera" text="Did you see the new designs?" no-jump></z-quoted-message>
						<div style="margin-top:.35rem">Yeah — looks great! 🎉</div>
					</z-message-bubble>
					<div class="meta">
						<span class="t">11:58</span>
						<z-delivery-status status="read"></z-delivery-status>
					</div>
				</div>

				<z-unread-divider label="New messages"></z-unread-divider>

				<z-message-group side="start" name="Alice Rivera" avatar-name="Alice Rivera" timestamp="2026-07-05T12:02:00Z">
					<z-message-bubble>Shipping the tokens now.</z-message-bubble>
				</z-message-group>

				<div class="own" style="margin-top:.5rem">
					<z-message-bubble side="end" group="single">On it 👍</z-message-bubble>
					<div class="meta"><span class="t">12:03</span><z-delivery-status status="delivered"></z-delivery-status></div>
					<z-read-receipt label="Seen by" style="margin-top:.35rem"></z-read-receipt>
				</div>
			</z-message-list>

			<h2>z-delivery-status — all states</h2>
			<div style="display:flex;gap:1.25rem;align-items:center">
				<z-delivery-status status="sending"></z-delivery-status>
				<z-delivery-status status="sent"></z-delivery-status>
				<z-delivery-status status="delivered"></z-delivery-status>
				<z-delivery-status status="read"></z-delivery-status>
				<z-delivery-status status="error"></z-delivery-status>
			</div>
		</div>

		<script type="module">
			document.querySelector('z-read-receipt').avatars = [{ name: 'Bob Chen' }, { name: 'Priya N' }, { name: 'Sam Okafor' }, { name: 'Dana Lee' }]
		</script>
	</body>
</html>
