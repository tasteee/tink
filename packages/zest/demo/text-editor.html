<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>zest · text editor</title>
		<link rel="stylesheet" href="../dist/ink.css" />
		<script type="module" src="../dist/zest.js"></script>
		<style>
			body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans, system-ui, sans-serif); padding: 2rem; }
			.wrap { max-width: 720px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
			h2 { font-size: 0.85rem; color: var(--muted-foreground); margin: 0 0 0.6rem; }
			.doc { border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; min-height: 8rem; line-height: 1.8; }
			.doc:focus { outline: none; border-color: var(--purple); }
			.log { font-family: var(--font-mono, monospace); font-size: 0.8rem; color: var(--muted-foreground); white-space: pre-wrap; }
			.row { display: flex; gap: 0.5rem; }
			button { font: inherit; }
		</style>
	</head>
	<body>
		<div class="wrap">
			<section>
				<h2>z-format-toolbar (always visible)</h2>
				<z-format-toolbar id="formatToolbar"></z-format-toolbar>
			</section>

			<section>
				<h2>Select text below to trigger z-selection-toolbar</h2>
				<div class="doc" contenteditable="true" id="doc">Select some of this text to see the floating selection toolbar appear above it. Try bold and italic.</div>
			</section>

			<section>
				<div class="row">
					<button id="showSlash">Show z-slash-menu</button>
					<button id="showMention">Show z-mention-popover</button>
					<button id="showBubble">Show z-bubble-menu (link)</button>
					<button id="showGutter">Show z-gutter-handle</button>
					<button id="showStatus">Cycle save state</button>
				</div>
			</section>

			<section>
				<h2>z-status-bar</h2>
				<z-status-bar id="statusBar"></z-status-bar>
			</section>

			<div class="log" id="log">events land here</div>
		</div>

		<z-selection-toolbar id="selectionToolbar"></z-selection-toolbar>
		<z-slash-menu id="slashMenu"></z-slash-menu>
		<z-mention-popover id="mentionPopover"></z-mention-popover>
		<z-bubble-menu id="bubbleMenu" variant="link"></z-bubble-menu>
		<z-gutter-handle id="gutterHandle"></z-gutter-handle>

		<script type="module">
			const log = document.getElementById('log')
			const append = (line) => (log.textContent = line + '\n' + log.textContent)

			const boldIcon = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><path d="M6 4h8a4 4 0 0 1 0 8H6zM6 12h9a4 4 0 0 1 0 8H6z"/></svg>'
			const italicIcon = '<svg viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" fill="none"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg>'

			// z-format-toolbar
			const formatToolbar = document.getElementById('formatToolbar')
			formatToolbar.headingOptions = [
				{ value: 'p', label: 'Paragraph' },
				{ value: 'h1', label: 'Heading 1' },
				{ value: 'h2', label: 'Heading 2' }
			]
			formatToolbar.headingValue = 'p'
			formatToolbar.items = [
				{ value: 'bold', icon: boldIcon, isActive: false },
				{ value: 'italic', icon: italicIcon, isActive: false }
			]
			formatToolbar.addEventListener('action', (e) => append('format action: ' + e.detail.value))
			formatToolbar.addEventListener('headingchange', (e) => append('heading: ' + e.detail.value))

			// z-selection-toolbar
			const selectionToolbar = document.getElementById('selectionToolbar')
			selectionToolbar.items = [
				{ value: 'bold', icon: boldIcon },
				{ value: 'italic', icon: italicIcon }
			]
			document.addEventListener('selectionchange', () => {
				const selection = document.getSelection()
				const isCollapsed = !selection || selection.isCollapsed || !selection.toString()
				selectionToolbar.isOpen = !isCollapsed
				if (isCollapsed) return
				const range = selection.getRangeAt(0)
				selectionToolbar.anchorRect = range.getBoundingClientRect()
			})
			selectionToolbar.addEventListener('action', (e) => append('selection action: ' + e.detail.value))

			// z-slash-menu
			const slashMenu = document.getElementById('slashMenu')
			slashMenu.items = [
				{ value: 'h1', label: 'Heading 1', description: 'Big section heading' },
				{ value: 'todo', label: 'To-do list' },
				{ value: 'image', label: 'Image' }
			]
			document.getElementById('showSlash').addEventListener('click', () => {
				const docEl = document.getElementById('doc')
				const rect = docEl.getBoundingClientRect()
				slashMenu.anchorRect = { x: rect.x + 20, y: rect.y + 20, width: 0, height: 20 }
				slashMenu.query = ''
				slashMenu.isOpen = true
			})
			slashMenu.addEventListener('select', (e) => { append('slash select: ' + e.detail.value); slashMenu.isOpen = false })
			slashMenu.addEventListener('dismiss', () => { append('slash dismiss'); slashMenu.isOpen = false })
			slashMenu.addEventListener('empty', () => append('slash empty'))

			// z-mention-popover
			const mentionPopover = document.getElementById('mentionPopover')
			mentionPopover.items = [
				{ value: 'u1', label: 'Ada Lovelace' },
				{ value: 'u2', label: 'Alan Turing' }
			]
			document.getElementById('showMention').addEventListener('click', () => {
				const docEl = document.getElementById('doc')
				const rect = docEl.getBoundingClientRect()
				mentionPopover.anchorRect = { x: rect.x + 40, y: rect.y + 40, width: 0, height: 20 }
				mentionPopover.query = ''
				mentionPopover.isOpen = true
			})
			mentionPopover.addEventListener('select', (e) => { append('mention select: ' + e.detail.label); mentionPopover.isOpen = false })

			// z-bubble-menu (link variant)
			const bubbleMenu = document.getElementById('bubbleMenu')
			bubbleMenu.url = 'https://example.com'
			document.getElementById('showBubble').addEventListener('click', () => {
				const docEl = document.getElementById('doc')
				const rect = docEl.getBoundingClientRect()
				bubbleMenu.anchorRect = { x: rect.x + 60, y: rect.y + 10, width: 40, height: 20 }
				bubbleMenu.isOpen = true
			})
			bubbleMenu.addEventListener('linkchange', (e) => append('link change: ' + e.detail.url))
			bubbleMenu.addEventListener('linkopen', () => append('link open'))
			bubbleMenu.addEventListener('linkunlink', () => append('link unlink'))

			// z-gutter-handle
			const gutterHandle = document.getElementById('gutterHandle')
			document.getElementById('showGutter').addEventListener('click', () => {
				const docEl = document.getElementById('doc')
				const rect = docEl.getBoundingClientRect()
				gutterHandle.anchorRect = { x: rect.x, y: rect.y + 10, width: rect.width, height: 20 }
				gutterHandle.isOpen = true
			})
			gutterHandle.addEventListener('add', () => append('gutter add'))

			// z-status-bar
			const statusBar = document.getElementById('statusBar')
			statusBar.text = document.getElementById('doc').textContent
			statusBar.cursorLine = 1
			statusBar.cursorColumn = 1
			document.getElementById('doc').addEventListener('input', (e) => (statusBar.text = e.target.textContent))
			let stateIndex = 0
			const states = ['saving', 'saved', 'idle']
			document.getElementById('showStatus').addEventListener('click', () => {
				statusBar.saveState = states[stateIndex % states.length]
				append('save state: ' + statusBar.saveState)
				stateIndex++
			})
		</script>
	</body>
</html>
