<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<title>zest · attachments</title>
		<link rel="stylesheet" href="../dist/ink.css" />
		<script type="module" src="../dist/zest.js"></script>
		<style>
			body { margin: 0; background: var(--background); color: var(--foreground); font-family: var(--font-sans, system-ui, sans-serif); padding: 2rem; }
			.wrap { max-width: 560px; margin: 0 auto; display: flex; flex-direction: column; gap: 1.5rem; }
			h2 { font-size: 0.85rem; color: var(--muted-foreground); margin: 0 0 0.6rem; }
			.own { display: flex; justify-content: flex-end; }
			.log { font-family: var(--font-mono, monospace); font-size: 0.8rem; color: var(--muted-foreground); }
		</style>
	</head>
	<body>
		<div class="wrap">
			<section>
				<h2>z-image-message — single / album / +N</h2>
				<div style="display:flex;gap:1rem;flex-wrap:wrap;align-items:flex-start">
					<z-image-message id="img1" style="width:200px"></z-image-message>
					<z-image-message id="img3" style="width:200px"></z-image-message>
					<z-image-message id="img7" style="width:200px"></z-image-message>
				</div>
			</section>

			<section>
				<h2>z-file-attachment (in a bubble)</h2>
				<div class="own">
					<z-message-bubble side="end">
						<z-file-attachment name="proposal-final.pdf" size="248000" href="#"></z-file-attachment>
					</z-message-bubble>
				</div>
			</section>

			<section>
				<h2>z-attachment-tray + z-attachment-chip (composer staging)</h2>
				<z-attachment-tray id="tray" accept="image/*,.pdf" multiple>
					<z-attachment-chip name="proposal.pdf" size="248000" type="application/pdf"></z-attachment-chip>
					<z-attachment-chip id="thumbchip" name="mockup.png" size="1240000" type="image/png"></z-attachment-chip>
					<z-attachment-chip name="upload.zip" size="8400000" progress="62"></z-attachment-chip>
				</z-attachment-tray>
			</section>

			<div class="log" id="log">events land here</div>
		</div>

		<script type="module">
			const svg = (label, hue) => 'data:image/svg+xml;utf8,' + encodeURIComponent(
				`<svg xmlns='http://www.w3.org/2000/svg' width='400' height='400'><rect width='400' height='400' fill='hsl(${hue} 55% 52%)'/><text x='200' y='230' font-size='120' fill='white' text-anchor='middle' font-family='sans-serif'>${label}</text></svg>`)
			const set = (n) => Array.from({length:n}, (_, i) => ({ src: svg(i+1, (i*55)%360), alt: 'Image '+(i+1) }))
			document.getElementById('img1').images = set(1)
			document.getElementById('img3').images = set(3)
			document.getElementById('img7').images = set(7)
			document.getElementById('thumbchip').thumbnail = svg('', 280)

			const log = document.getElementById('log')
			document.getElementById('tray').addEventListener('remove', (e) => log.textContent = 'chip → remove ' + (e.detail.value||'(unnamed)'))
			document.getElementById('tray').addEventListener('files', (e) => log.textContent = 'tray → files: ' + e.detail.files.length)
			document.addEventListener('open', (e) => { if (e.detail && e.detail.src) log.textContent = 'image → open index ' + e.detail.index })
		</script>
	</body>
</html>
